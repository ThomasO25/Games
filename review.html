<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Review · The Parlour</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  .glist{display:flex;flex-direction:column;gap:9px}
  .grow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:.15s}
  .grow:hover{border-color:var(--brass)} .grow:active{transform:scale(.99)}
  .grow .res{font-family:'Cormorant Garamond';font-size:21px;font-weight:700;width:54px;text-align:center}
  .grow .res.w{color:var(--brass-lite)} .grow .res.l{color:var(--red)} .grow .res.d{color:var(--muted)}
  .grow .meta{flex:1;min-width:0} .grow .meta .ttl{font-size:14.5px;font-weight:500}
  .grow .meta .when{font-size:11.5px;color:var(--faint);margin-top:2px} .grow .arr{color:var(--faint);font-size:18px}
  .evalrow{display:flex;align-items:center;gap:10px;margin-top:12px}
  .evalnum{font-family:'Cormorant Garamond';font-size:22px;font-weight:700;min-width:64px;text-align:center}
  .evalnum.good{color:var(--brass-lite)} .evalnum.bad{color:var(--red)}
  .evalbar{flex:1;height:10px;border-radius:6px;background:var(--pc-black);overflow:hidden;border:1px solid var(--line)}
  .evalbar i{display:block;height:100%;background:linear-gradient(90deg,var(--pc-white),#d8cbac);transition:width .3s}
  .swing{margin-top:10px;font-size:13.5px;color:var(--muted);line-height:1.5;min-height:20px} .swing b{color:var(--red)}
  .progress{font-size:12px;color:var(--brass-lite);margin-top:10px;letter-spacing:.5px}
  .mistakes{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .mistakes h4{font-family:'Cormorant Garamond';font-size:18px;margin:0 0 8px;font-weight:600}
  .mistakes .mi{font-size:13.5px;color:var(--muted);padding:6px 0;cursor:pointer;border-bottom:1px solid var(--line)}
  .mistakes .mi:last-child{border-bottom:none} .mistakes .mi:hover{color:var(--text)}
  .tag2{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-right:7px;font-weight:600}
  .tag2.blunder{background:var(--red);color:#fff} .tag2.mistake{background:#c8862e;color:#1a1308} .tag2.inacc{background:var(--faint);color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <header class="appbar"></header>
  <h2 class="title">Review Room</h2>
  <p class="lead" id="lead">Your saved games, replayed move by move and checked by a chess engine.</p>

  <div class="glist" id="gameList"></div>

  <div id="reviewer" class="hidden">
    <div class="row" style="margin-bottom:14px"><button class="btn ghost" id="backList">← All games</button></div>
    <div class="board-frame"><div class="board" id="revBoard"></div></div>
    <div class="evalrow">
      <div class="evalnum" id="evalNum">·</div>
      <div class="evalbar"><i id="evalFill" style="width:50%"></i></div>
    </div>
    <div class="swing" id="swing"></div>
    <div class="progress" id="progress"></div>
    <div class="row">
      <button class="btn" id="rStart">|←</button>
      <button class="btn" id="rPrev">← Prev</button>
      <button class="btn" id="rNext">Next →</button>
      <button class="btn" id="rEnd">→|</button>
    </div>
    <div class="moves" id="rMoves"></div>
    <div class="mistakes" id="mistakes"></div>
  </div>
  <footer>Engine analysis by Stockfish. Falls back to a material check if the engine can't load.</footer>
</div>

<script type="module">
import { requireApproved, renderHeader, listGames } from './common.js';
import { Chess } from 'https://cdn.jsdelivr.net/npm/chess.js@1.4.0/+esm';
await requireApproved();
renderHeader('review.html');

const GLYPH={p:'\u265F\uFE0E',n:'\u265E\uFE0E',b:'\u265D\uFE0E',r:'\u265C\uFE0E',q:'\u265B\uFE0E',k:'\u265A\uFE0E'};
const VAL={p:1,n:3,b:3,r:5,q:9,k:0};
const FILES='abcdefgh';

/* ============ engine (Stockfish.js, lazy + safe) ============ */
let engine=null, engineState='idle'; // idle|loading|ready|failed
function initEngine(){
  if(engineState==='ready') return Promise.resolve(engine);
  if(engineState==='failed') return Promise.reject();
  if(engineState==='loading') return loadPromise;
  engineState='loading';
  loadPromise=new Promise((resolve,reject)=>{
    try{
      const src="importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');";
      const w=new Worker(URL.createObjectURL(new Blob([src],{type:'text/javascript'})));
      let ok=false;
      const to=setTimeout(()=>{ if(!ok){ engineState='failed'; reject(); } }, 9000);
      w.onmessage=(e)=>{ const l=lineOf(e); if(l.indexOf('uciok')>=0){ ok=true; clearTimeout(to); engine=w; engineState='ready'; resolve(w); } };
      w.onerror=()=>{ if(!ok){ engineState='failed'; clearTimeout(to); reject(); } };
      w.postMessage('uci');
    }catch(err){ engineState='failed'; reject(err); }
  });
  return loadPromise;
}
let loadPromise=null;
function lineOf(e){ return typeof e.data==='string'?e.data:((e.data&&e.data.data)||''); }
function engineEval(fen, movetime=200){
  return new Promise(resolve=>{
    if(!engine){ resolve(null); return; }
    let best=null;
    const handler=(e)=>{
      const l=lineOf(e); let m;
      if((m=l.match(/score (cp|mate) (-?\d+)/))) best={type:m[1],val:parseInt(m[2],10)};
      if(l.indexOf('bestmove')>=0){
        engine.removeEventListener('message',handler);
        const side=fen.split(' ')[1]; let cp;
        if(!best) cp=0; else if(best.type==='mate') cp=(best.val>0?1:-1)*(100000-Math.abs(best.val)); else cp=best.val;
        if(side==='b') cp=-cp;   // to White's perspective
        resolve(cp);
      }
    };
    engine.addEventListener('message',handler);
    engine.postMessage('position fen '+fen);
    engine.postMessage('go movetime '+movetime);
  });
}

/* ============ game list ============ */
async function load(){
  document.getElementById('reviewer').classList.add('hidden');
  const list=document.getElementById('gameList'); list.classList.remove('hidden');
  list.innerHTML='<div class="empty">Loading…</div>';
  const games=await listGames();
  if(!games.length){ list.innerHTML='<div class="empty">No saved games yet. Finish a game of Chess and it lands here automatically.</div>'; return; }
  list.innerHTML='';
  games.forEach(g=>{
    const me=g.color==='w'?'w':'b'; let rc='d', rt='½';
    if(g.result==='1-0'){ rt='1–0'; rc=me==='w'?'w':'l'; } else if(g.result==='0-1'){ rt='0–1'; rc=me==='b'?'w':'l'; }
    const dt=g.ts&&g.ts.seconds?new Date(g.ts.seconds*1000):new Date();
    const row=document.createElement('div'); row.className='grow';
    row.innerHTML=`<div class="res ${rc}">${rt}</div>
      <div class="meta"><div class="ttl">vs ${g.opponent||'—'} · ${g.moves?g.moves.length:0} half-moves</div>
      <div class="when">${dt.toLocaleDateString(undefined,{month:'short',day:'numeric'})} · ${g.mode==='cpu'?'vs Bot':(g.mode==='online'?'Online':'Pass & Play')}</div></div>
      <div class="arr">›</div>`;
    row.onclick=()=>open(g); list.appendChild(row);
  });
}

/* ============ reviewer ============ */
let moves=[], idx=0, matSeries=[], myColor='w', fens=[], evalCp=[], analyzeToken=0;
function material(c){ let w=0,b=0; c.board().forEach(r=>r.forEach(p=>{ if(p){ if(p.color==='w')w+=VAL[p.type]; else b+=VAL[p.type]; } })); return w-b; }
function open(g){
  document.getElementById('gameList').classList.add('hidden');
  document.getElementById('reviewer').classList.remove('hidden');
  moves=g.moves||[]; idx=0; myColor=g.color||'w';
  const t=new Chess(); matSeries=[material(t)]; fens=[t.fen()];
  moves.forEach(m=>{ try{ t.move({from:m.from,to:m.to,promotion:m.promotion||'q'}); }catch(e){} matSeries.push(material(t)); fens.push(t.fen()); });
  evalCp=new Array(fens.length).fill(null);
  buildMistakesMaterial();          // instant fallback list
  draw();
  startEngineAnalysis();            // upgrade to engine when ready
}
function positionAt(i){ const c=new Chess(); for(let k=0;k<i;k++){ try{ c.move({from:moves[k].from,to:moves[k].to,promotion:moves[k].promotion||'q'}); }catch(e){} } return c; }
function draw(){
  const c=positionAt(idx); const grid=c.board();
  const el=document.getElementById('revBoard'); el.innerHTML='';
  let lm=null; if(idx>0) lm={from:moves[idx-1].from,to:moves[idx-1].to};
  for(let r=0;r<8;r++)for(let cc=0;cc<8;cc++){
    const name=FILES[cc]+(8-r); const sq=document.createElement('div'); sq.className='sq '+(((r+cc)%2)?'dark':'light');
    if(lm&&(lm.from===name||lm.to===name)) sq.classList.add('last');
    const p=grid[r][cc]; if(p){const s=document.createElement('span');s.className='piece '+p.color;s.textContent=GLYPH[p.type];sq.appendChild(s);} el.appendChild(sq);
  }
  // eval display: engine if available else material
  const en=evalCp[idx];
  const num=document.getElementById('evalNum'), fill=document.getElementById('evalFill');
  if(en!==null && en!==undefined){
    if(Math.abs(en)>=99000){ const mv=Math.round((100000-Math.abs(en))); num.textContent='#'+mv*(en>0?1:-1); }
    else num.textContent=(en>0?'+':'')+(en/100).toFixed(1);
    num.className='evalnum '+(en>=0?'good':'bad');
    fill.style.width=Math.max(3,Math.min(97, 50 + Math.max(-10,Math.min(10,en/100))*5))+'%';
  } else {
    const bal=matSeries[idx]; num.textContent=bal===0?'0':(bal>0?'+'+bal:String(bal)); num.className='evalnum '+(bal>=0?'good':'bad');
    fill.style.width=Math.max(5,Math.min(95,50+bal*5))+'%';
  }
  // swing note
  const sw=document.getElementById('swing');
  if(idx>0){
    const moverWhite=((idx-1)%2===0); const moverName=moverWhite?'White':'Black';
    const eb=evalCp[idx-1], ea=evalCp[idx];
    if(eb!==null&&ea!==null&&eb!==undefined&&ea!==undefined){
      const loss=moverWhite?(eb-ea):(ea-eb);
      if(loss>=300) sw.innerHTML=`<b>Blunder.</b> ${moverName}’s ${moves[idx-1].san} swung the eval by ${(loss/100).toFixed(1)}.`;
      else if(loss>=150) sw.innerHTML=`Mistake — ${moverName}’s ${moves[idx-1].san} (${(loss/100).toFixed(1)}).`;
      else if(loss>=80) sw.innerHTML=`Inaccuracy — ${moverName}’s ${moves[idx-1].san}.`;
      else sw.textContent='';
    } else {
      const swing=matSeries[idx]-matSeries[idx-1];
      if(Math.abs(swing)>=3) sw.innerHTML=`<b>Big material swing</b> on ${moverName}’s ${moves[idx-1].san}.`;
      else if(Math.abs(swing)===2) sw.innerHTML=`A 2-point trade on ${moves[idx-1].san}.`; else sw.textContent='';
    }
  } else document.getElementById('swing').textContent='';
  const ml=document.getElementById('rMoves'); let html='';
  for(let i=0;i<moves.length;i+=2){ html+=`<span class="num">${i/2+1}.</span><span class="mv ${idx===i+1?'cur':''}">${moves[i].san}</span>`; if(moves[i+1]) html+=`<span class="mv ${idx===i+2?'cur':''}">${moves[i+1].san}</span>`; }
  ml.innerHTML=html;
}
function buildMistakesMaterial(){
  const box=document.getElementById('mistakes'); const meWhite=myColor==='w'; const N=moves.length; const items=[];
  for(let k=0;k<N;k++){ const mw=(k%2===0); if(mw!==meWhite) continue; const before=matSeries[k]; const after=(k+2<=N)?matSeries[k+2]:matSeries[k+1]; const d=after-before; const loss=meWhite?-d:d; if(loss>=2) items.push({ply:k+1,san:moves[k].san,lost:loss,num:Math.floor(k/2)+1}); }
  items.sort((a,b)=>b.lost-a.lost);
  if(!items.length){ box.innerHTML='<h4>Your mistakes</h4><div class="mi">No big material drops detected.</div>'; return; }
  box.innerHTML='<h4>Your costly moves (material)</h4>'+items.slice(0,6).map(it=>`<div class="mi" data-ply="${it.ply}">Move ${it.num} — <b>${it.san}</b> cost ~${it.lost} pts. <span style="color:var(--brass-lite)">View</span></div>`).join('');
  wireMistakes();
}
function buildMistakesEngine(){
  const box=document.getElementById('mistakes'); const meWhite=myColor==='w'; const N=moves.length; const items=[];
  for(let k=0;k<N;k++){ const mw=(k%2===0); if(mw!==meWhite) continue; const eb=evalCp[k], ea=evalCp[k+1]; if(eb===null||ea===null||eb===undefined||ea===undefined) continue;
    const loss=meWhite?(eb-ea):(ea-eb);
    let kind=null; if(loss>=300)kind='blunder'; else if(loss>=150)kind='mistake'; else if(loss>=80)kind='inacc';
    if(kind) items.push({ply:k+1,san:moves[k].san,loss,kind,num:Math.floor(k/2)+1}); }
  items.sort((a,b)=>b.loss-a.loss);
  if(!items.length){ box.innerHTML='<h4>Engine review</h4><div class="mi">Clean game — no blunders, mistakes, or inaccuracies on your moves. Nicely played.</div>'; return; }
  const label={blunder:'Blunder',mistake:'Mistake',inacc:'Inaccuracy'};
  box.innerHTML='<h4>Engine review · your moves</h4>'+items.slice(0,10).map(it=>`<div class="mi" data-ply="${it.ply}"><span class="tag2 ${it.kind}">${label[it.kind]}</span>Move ${it.num} <b>${it.san}</b> — lost ${(it.loss/100).toFixed(1)}. <span style="color:var(--brass-lite)">View</span></div>`).join('');
  wireMistakes();
}
function wireMistakes(){ document.querySelectorAll('.mi[data-ply]').forEach(el=>el.onclick=()=>{ idx=Number(el.dataset.ply); draw(); window.scrollTo({top:0,behavior:'smooth'}); }); }

async function startEngineAnalysis(){
  const token=++analyzeToken;
  const prog=document.getElementById('progress');
  prog.textContent='Starting engine…';
  try{ await initEngine(); }catch(e){ prog.textContent='Engine unavailable — showing material review.'; return; }
  if(token!==analyzeToken) return;
  for(let i=0;i<fens.length;i++){
    if(token!==analyzeToken) return;            // a newer game opened
    const cp=await engineEval(fens[i], 200);
    if(token!==analyzeToken) return;
    evalCp[i]=cp;
    prog.textContent='Analyzing with Stockfish… '+(i+1)+'/'+fens.length;
    if(i===idx || i===idx+1) draw();             // refresh eval shown
  }
  prog.textContent='Engine analysis complete.';
  buildMistakesEngine(); draw();
}

document.getElementById('backList').onclick=load;
document.getElementById('rStart').onclick=()=>{idx=0;draw();};
document.getElementById('rPrev').onclick=()=>{if(idx>0){idx--;draw();}};
document.getElementById('rNext').onclick=()=>{if(idx<moves.length){idx++;draw();}};
document.getElementById('rEnd').onclick=()=>{idx=moves.length;draw();};
load();
</script>
</body>
</html>
