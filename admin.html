<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin · The Parlour</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  .prow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .prow .pinfo{flex:1;min-width:0}
  .prow .pname{font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:7px}
  .prow .tag{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
  .tag.admin{background:var(--brass);color:var(--bg)} .tag.pending{background:var(--red);color:#fff} .tag.ok{background:var(--green);color:#10130f}
  .prow .pmeta{font-size:11.5px;color:var(--faint);margin-top:2px}
  .prow .pact{display:flex;gap:6px}
  .prow .mini{font-size:12px;padding:7px 10px;border-radius:9px;border:1px solid var(--line);background:var(--bg2);color:var(--text);cursor:pointer}
  .prow .mini.good{border-color:var(--green);color:var(--green)} .prow .mini.bad{border-color:var(--red);color:var(--red)}
  .seg{font-family:'Cormorant Garamond';font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--brass);margin:22px 0 10px}
</style>
</head>
<body>
<div class="wrap">
  <header class="appbar"></header>
  <h2 class="title">Host Controls</h2>
  <p class="lead">Approve who gets into the Parlour, and hand out host privileges. Only hosts can see this page.</p>
  <div id="pending"></div>
  <div class="seg">Members</div>
  <div id="members"></div>
  <footer>The Parlour · host panel</footer>
</div>
<script type="module">
import { requireApproved, renderHeader, isAdmin, listAllPlayers, setApproved, setRole, uid } from './common.js';
await requireApproved();
renderHeader('admin.html');
if(!isAdmin()){ document.querySelector('.wrap').innerHTML='<header class="appbar"></header><div class="workshop"><div class="big">&#128274;</div><h2 class="title">Hosts only</h2><p class="lead">This page is for hosts.</p><a class="btn primary" href="index.html">Back to the Parlour</a></div>'; renderHeader('admin.html'); throw new Error('not admin');}

async function render(){
  const players = await listAllPlayers();
  const pend = players.filter(p=>!p.approved && p.role!=='admin');
  const mem  = players.filter(p=>p.approved || p.role==='admin');
  const pBox=document.getElementById('pending');
  if(!pend.length) pBox.innerHTML='<div class="seg">Waiting room</div><div class="empty" style="padding:4px 2px">No one waiting.</div>';
  else pBox.innerHTML='<div class="seg">Waiting room</div>'+pend.map(p=>rowHTML(p,true)).join('');
  document.getElementById('members').innerHTML = mem.map(p=>rowHTML(p,false)).join('') || '<div class="empty">No members yet.</div>';
  wire();
}
function rowHTML(p, waiting){
  const me = p.uid===uid();
  const tag = p.role==='admin' ? '<span class="tag admin">Host</span>' : (p.approved?'<span class="tag ok">Member</span>':'<span class="tag pending">Pending</span>');
  let acts='';
  if(waiting) acts=`<button class="mini good" data-approve="${p.uid}">Approve</button>`;
  else if(!me){
    acts = (p.approved?`<button class="mini bad" data-revoke="${p.uid}">Revoke</button>`:'') +
           (p.role==='admin'?`<button class="mini" data-demote="${p.uid}">Remove host</button>`:`<button class="mini" data-promote="${p.uid}">Make host</button>`);
  } else acts='<span class="pmeta">that\u2019s you</span>';
  return `<div class="prow"><div class="pinfo"><div class="pname">${p.name||'—'} ${tag}</div>
    <div class="pmeta">${p.email||''} · rating ${p.rating||800} · ${(p.chips||0).toLocaleString()} chips</div></div>
    <div class="pact">${acts}</div></div>`;
}
function wire(){
  document.querySelectorAll('[data-approve]').forEach(b=>b.onclick=async()=>{ await setApproved(b.dataset.approve,true); render(); });
  document.querySelectorAll('[data-revoke]').forEach(b=>b.onclick=async()=>{ if(confirm('Revoke access?')){ await setApproved(b.dataset.revoke,false); render(); } });
  document.querySelectorAll('[data-promote]').forEach(b=>b.onclick=async()=>{ await setRole(b.dataset.promote,'admin'); await setApproved(b.dataset.promote,true); render(); });
  document.querySelectorAll('[data-demote]').forEach(b=>b.onclick=async()=>{ await setRole(b.dataset.demote,'player'); render(); });
}
render();
</script>
</body>
</html>
